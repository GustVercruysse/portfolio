<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gust Vercruysse</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  font-family: 'Inter', sans-serif;
  background: #111110;
  color: #e8e6e1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
}

/* subtle grid background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
  z-index: 0;
}

.wrapper {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  gap: 2.5rem;
  padding: 2rem;
}

/* photo */
.avatar {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  overflow: hidden;
  border: 1px solid #2a2a28;
  box-shadow: 0 4px 30px rgba(0,0,0,0.6);
  flex-shrink: 0;
}
.avatar img {
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center top;
}

/* name + title */
.intro {}
.intro h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2.2rem, 5vw, 3.6rem);
  font-weight: 700;
  letter-spacing: -0.02em;
  color: #f0ede8;
  line-height: 1.1;
  margin-bottom: 0.6rem;
}
.intro p {
  font-size: 0.95rem;
  color: #888;
  font-weight: 300;
  letter-spacing: 0.04em;
}
.intro .dot {
  display: inline-block;
  margin: 0 0.5rem;
  color: #333;
}

/* divider */
.divider {
  width: 1px;
  height: 40px;
  background: #252523;
}

/* nav links */
.links {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  width: 100%;
  max-width: 320px;
}

.link-btn {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.9rem 1.4rem;
  background: #161614;
  border: 1px solid #222220;
  border-radius: 10px;
  text-decoration: none;
  color: #ccc;
  font-size: 0.9rem;
  font-weight: 400;
  letter-spacing: 0.01em;
  transition: border-color 0.2s, color 0.2s, background 0.2s;
}
.link-btn:hover {
  border-color: #444;
  color: #f0ede8;
  background: #1a1a18;
}
.link-btn .arrow {
  font-size: 0.75rem;
  color: #444;
  transition: color 0.2s, transform 0.2s;
}
.link-btn:hover .arrow {
  color: #888;
  transform: translateX(3px);
}

/* bottom */
.footer-note {
  font-size: 0.72rem;
  color: #333;
  letter-spacing: 0.06em;
}

/* fade in */
@keyframes up {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: none; }
}
.wrapper > * {
  animation: up 0.55s ease both;
}
.wrapper > *:nth-child(1) { animation-delay: 0.05s; }
.wrapper > *:nth-child(2) { animation-delay: 0.15s; }
.wrapper > *:nth-child(3) { animation-delay: 0.22s; }
.wrapper > *:nth-child(4) { animation-delay: 0.30s; }
.wrapper > *:nth-child(5) { animation-delay: 0.37s; }

@media (max-width: 480px) {
  .links { max-width: 100%; }
}
</style>
</head>
